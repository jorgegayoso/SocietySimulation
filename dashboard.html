<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg-deep: #0a0c10;
    --bg-card: #12151c;
    --bg-card-hover: #181c26;
    --bg-surface: #1a1e28;
    --border: #252a36;
    --border-active: #3b82f6;
    --text-primary: #e8eaf0;
    --text-secondary: #8891a5;
    --text-muted: #525b6e;
    --accent-blue: #3b82f6;
    --accent-cyan: #22d3ee;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --accent-emerald: #10b981;
    --accent-violet: #8b5cf6;
    --accent-orange: #f97316;
    --accent-pink: #ec4899;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- HEADER --- */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 12, 16, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .header-inner {
    max-width: 1440px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
    font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em;
  }
  .logo-flag {
    width: 32px; height: 22px; border-radius: 3px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .logo-flag .red { flex: 1; background: #c60b1e; }
  .logo-flag .yellow { flex: 2; background: #ffc400; }
  .logo-flag .red2 { flex: 1; background: #c60b1e; }
  .header-meta {
    font-size: 0.8rem; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* --- CATEGORY NAV --- */
  .nav-bar {
    max-width: 1440px; margin: 0 auto;
    padding: 1.25rem 2rem 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .nav-btn {
    padding: 10px 20px; border-radius: 100px;
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 0.85rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .nav-btn.active {
    background: var(--accent-blue); border-color: var(--accent-blue);
    color: #fff; box-shadow: 0 0 20px rgba(59,130,246,0.25);
  }

  /* --- KPI STRIP --- */
  .kpi-strip {
    max-width: 1440px; margin: 1.25rem auto 0; padding: 0 2rem;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px;
  }
  .kpi {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .kpi-label {
    font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.06em; font-weight: 500;
  }
  .kpi-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem; font-weight: 600;
  }
  .kpi-change {
    font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
  }
  .kpi-change.positive { color: var(--accent-emerald); }
  .kpi-change.negative { color: var(--accent-rose); }

  /* --- CHART GRID --- */
  .charts-container {
    max-width: 1440px; margin: 1.5rem auto 3rem; padding: 0 2rem;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px;
  }
  .chart-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 20px 16px;
    transition: border-color 0.2s;
  }
  .chart-card:hover { border-color: #333a4a; }
  .chart-title {
    font-size: 0.85rem; font-weight: 600; margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .chart-subtitle {
    font-size: 0.72rem; color: var(--text-muted); margin-bottom: 14px;
  }
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap canvas { width: 100% !important; }

  /* --- ELECTION TIMELINE --- */
  .election-section {
    max-width: 1440px; margin: 0 auto 3rem; padding: 0 2rem;
  }
  .election-section h2 {
    font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem;
  }
  .election-timeline {
    display: flex; gap: 14px; overflow-x: auto; padding-bottom: 12px;
  }
  .election-card {
    min-width: 260px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; flex-shrink: 0;
  }
  .election-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem; font-weight: 700; margin-bottom: 8px;
    color: var(--accent-blue);
  }
  .election-coalition {
    font-size: 0.78rem; color: var(--accent-cyan);
    margin-bottom: 10px; font-weight: 500;
  }
  .election-bar-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
  }
  .election-party-name {
    font-size: 0.72rem; width: 50px; text-align: right;
    color: var(--text-secondary); font-family: 'JetBrains Mono', monospace;
  }
  .election-bar-track {
    flex: 1; height: 14px; background: var(--bg-surface);
    border-radius: 4px; overflow: hidden;
  }
  .election-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 0.4s ease;
  }
  .election-seats {
    font-size: 0.68rem; color: var(--text-muted); width: 32px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* --- GOV TIMELINE (bottom of Politics tab) --- */
  .gov-timeline {
    max-width: 1440px; margin: 0 auto 3rem; padding: 0 2rem;
  }
  .gov-timeline h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
  .gov-bar-container {
    display: flex; height: 48px; border-radius: var(--radius-sm);
    overflow: hidden; border: 1px solid var(--border);
  }
  .gov-bar-segment {
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 600; color: #fff;
    font-family: 'JetBrains Mono', monospace;
    transition: opacity 0.2s; cursor: default;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .gov-bar-segment:hover { opacity: 0.85; }
  .gov-legend {
    display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap;
  }
  .gov-legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: var(--text-secondary);
  }
  .gov-legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  @media (max-width: 900px) {
    .charts-container { grid-template-columns: 1fr; }
    .kpi-strip { grid-template-columns: repeat(3, 1fr); }
    .nav-bar { padding: 1rem 1rem 0; }
    .charts-container, .election-section, .gov-timeline, .kpi-strip { padding: 0 1rem; }
  }
</style>

// ── HELPERS ──
function getVal(record, dotKey) {
  const parts = dotKey.split('.');
  let v = record;
  for (const p of parts) v = v[p];
  return v;
}
function getSeries(dotKey) {
  return SIM.yearly_data.map(d => getVal(d, dotKey));
}
function pctChange(a, b) {
  if (a === 0) return 0;
  return ((b - a) / Math.abs(a)) * 100;
}

// ── CHART CREATION ──
Chart.defaults.color = '#8891a5';
Chart.defaults.borderColor = 'rgba(37,42,54,0.6)';
Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size = 11;

const chartInstances = [];

function destroyCharts() {
  chartInstances.forEach(c => c.destroy());
  chartInstances.length = 0;
}

function makeChart(canvas, config) {
  const { title, keys, pct, labels, stacked, refLine } = config;
  const datasets = keys.map((k, i) => {
    const data = getSeries(k).map(v => pct ? v * 100 : v);
    const color = ACCENT_CYCLE[i % ACCENT_CYCLE.length];
    const bgColor = color.replace(',1)', ',0.15)');
    return {
      label: labels ? labels[i] : k.split('.').pop().replace(/_/g, ' '),
      data,
      borderColor: color,
      backgroundColor: stacked ? color.replace(',1)', ',0.7)') : bgColor,
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      fill: stacked ? true : (keys.length === 1),
    };
  });

  // Election year markers
  const electionYears = SIM.election_history.map(e => e.year);
  const annotations = {};
  electionYears.forEach((ey, i) => {
    const idx = years.indexOf(ey);
    if (idx >= 0) {
      annotations['elec' + i] = {
        type: 'line', xMin: idx, xMax: idx,
        borderColor: 'rgba(255,255,255,0.12)', borderWidth: 1, borderDash: [4, 4],
      };
    }
  });
  if (refLine !== undefined) {
    annotations['ref'] = {
      type: 'line', yMin: refLine, yMax: refLine,
      borderColor: 'rgba(244,63,94,0.4)', borderWidth: 1.5, borderDash: [6, 4],
      label: { display: true, content: `${refLine}`, position: 'start', font: { size: 10 }, color: 'rgba(244,63,94,0.7)' }
    };
  }

  const chart = new Chart(canvas, {
    type: 'line',
    data: { labels: years, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: keys.length > 1, position: 'top', labels: { boxWidth: 12, padding: 10 } },
        tooltip: {
          backgroundColor: 'rgba(18,21,28,0.95)', titleColor: '#e8eaf0',
          bodyColor: '#8891a5', borderColor: '#252a36', borderWidth: 1,
          padding: 10, cornerRadius: 8,
          callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}${pct ? '%' : ''}` }
        },
        annotation: { annotations },
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } },
        y: {
          stacked: !!stacked,
          grid: { color: 'rgba(37,42,54,0.5)' },
          ticks: { callback: v => pct ? v.toFixed(0) + '%' : v.toLocaleString() }
        },
      },
    },
    plugins: [{ /* annotation plugin loaded below */ }],
  });
  chartInstances.push(chart);
}

    `<button class="nav-btn ${k === activeCategory ? 'active' : ''}" onclick="setCategory('${k}')">${v.label}</button>`
  ).join('');

  // KPIs
  const kpiHtml = cat.kpis.map(kpi => {
    const cur = getVal(latest, kpi.key);
    const prev = getVal(initial, kpi.key);
    const change = pctChange(prev, cur);
    const isGood = (kpi.good === 'up' && change > 0) || (kpi.good === 'down' && change < 0) || kpi.good === 'neutral';
    return `<div class="kpi">
      <div class="kpi-label">${kpi.label}</div>
      <div class="kpi-value">${kpi.fmt(cur)}</div>
      <div class="kpi-change ${isGood ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${change.toFixed(1)}% since 2024</div>
    </div>`;
  }).join('');
  document.getElementById('kpiStrip').innerHTML = kpiHtml;

  // Charts
  if (activeCategory === 'politics') {
    document.getElementById('chartsContainer').innerHTML = '';
    renderPoliticsSection();
    return;
  }

  document.getElementById('extraSections').innerHTML = '';
  const chartsHtml = cat.charts.map((c, i) =>
    `<div class="chart-card">
      <div class="chart-title">${c.title}</div>
      <div class="chart-subtitle">${c.sub || ''}</div>
      <div class="chart-wrap"><canvas id="chart_${i}"></canvas></div>
    </div>`
  ).join('');
  document.getElementById('chartsContainer').innerHTML = chartsHtml;

  // Init charts
  requestAnimationFrame(() => {
    cat.charts.forEach((c, i) => {
      const canvas = document.getElementById(`chart_${i}`);
      if (canvas) makeChart(canvas, c);
    });
  });
}

function renderPoliticsSection() {
  const extra = document.getElementById('extraSections');

  // Government timeline bar
  const totalYears = years.length;
  const coalitionColors = { 'PSOE': '#e30613', 'PP': '#1e6bc4' };
  let segments = [];
  let currentCoalition = null;
  let startIdx = 0;

  SIM.yearly_data.forEach((d, i) => {
    const lead = d.government.coalition[0];
    if (lead !== currentCoalition) {
      if (currentCoalition !== null) {
        segments.push({ party: currentCoalition, start: startIdx, end: i, coalition: SIM.yearly_data[startIdx].government.coalition });
      }
      currentCoalition = lead;
      startIdx = i;
    }
  });
  segments.push({ party: currentCoalition, start: startIdx, end: totalYears, coalition: SIM.yearly_data[startIdx].government.coalition });

  const barHtml = segments.map(s => {
    const width = ((s.end - s.start) / totalYears * 100);
    const color = coalitionColors[s.party] || '#666';
    const label = s.coalition.join('+');
    const yrs = `${years[s.start]}–${years[Math.min(s.end, totalYears - 1)]}`;
    return `<div class="gov-bar-segment" style="width:${width}%;background:${color}" title="${label} (${yrs})">${width > 8 ? yrs : ''}</div>`;
  }).join('');

  // Election cards
  const electionCards = SIM.election_history.map(el => {
    const maxSeats = Math.max(...Object.values(el.seats));
    const sortedParties = Object.entries(el.seats).sort((a, b) => b[1] - a[1]);
    const bars = sortedParties.filter(([_, s]) => s > 0).map(([party, seats]) => {
      const pct = (seats / 350 * 100);
      const color = PARTY_COLORS[party] || '#555';
      return `<div class="election-bar-row">
        <div class="election-party-name">${party}</div>
        <div class="election-bar-track">
          <div class="election-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="election-seats">${seats}</div>
      </div>`;
    }).join('');
    return `<div class="election-card">
      <div class="election-year">${el.year}</div>
      <div class="election-coalition">${el.coalition.join(' + ')}</div>
      ${bars}
    </div>`;
  }).join('');

  // Coalition stability chart
  const stabilityChartId = 'stabilityChart';
  const voteShareChartId = 'voteShareChart';

  extra.innerHTML = `
    <div class="gov-timeline">
      <h2>Government Timeline</h2>
      <div class="gov-bar-container">${barHtml}</div>
      <div class="gov-legend">
        <div class="gov-legend-item"><div class="gov-legend-dot" style="background:#e30613"></div>PSOE-led</div>
        <div class="gov-legend-item"><div class="gov-legend-dot" style="background:#1e6bc4"></div>PP-led</div>
      </div>
    </div>
    <div class="election-section">
      <h2>Election Results</h2>
      <div class="election-timeline">${electionCards}</div>
    </div>
    <div class="charts-container">
      <div class="chart-card">
        <div class="chart-title">Coalition Stability</div>
        <div class="chart-subtitle">0–100% (higher = more stable government)</div>
        <div class="chart-wrap"><canvas id="${stabilityChartId}"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Party Vote Shares Over Time</div>
        <div class="chart-subtitle">% at each election</div>
        <div class="chart-wrap"><canvas id="${voteShareChartId}"></canvas></div>
      </div>
    </div>
  `;

  requestAnimationFrame(() => {
    // Stability chart
    const stabData = SIM.yearly_data.map(d => (d.government.stability || 0) * 100);
    const stabCanvas = document.getElementById(stabilityChartId);
    if (stabCanvas) {
      const c = new Chart(stabCanvas, {
        type: 'line',
        data: { labels: years, datasets: [{ label: 'Stability %', data: stabData, borderColor: ACCENT_CYCLE[0], backgroundColor: ACCENT_CYCLE[0].replace(',1)', ',0.1)'), borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { min: 0, max: 100 } } },
      });
      chartInstances.push(c);
    }

    // Vote shares over elections
    const elYears = SIM.election_history.map(e => e.year);
    const allParties = [...new Set(SIM.election_history.flatMap(e => Object.keys(e.vote_shares)))];
    const mainParties = ['PP', 'PSOE', 'VOX', 'SUMAR', 'ERC', 'JUNTS', 'PNV', 'BILDU'];
    const vsDatasets = mainParties.filter(p => allParties.includes(p)).map(party => ({
      label: party,
      data: SIM.election_history.map(e => (e.vote_shares[party] || 0) * 100),
      borderColor: PARTY_COLORS[party] || '#666',
      backgroundColor: 'transparent',
      borderWidth: 2.5, pointRadius: 4, tension: 0.3,
    }));
    const vsCanvas = document.getElementById(voteShareChartId);
    if (vsCanvas) {
      const c = new Chart(vsCanvas, {
        type: 'line',
        data: { labels: elYears, datasets: vsDatasets },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { boxWidth: 10, padding: 8, font: { size: 10 } } } }, scales: { x: { grid: { display: false } }, y: { min: 0, ticks: { callback: v => v + '%' } } } },
      });
      chartInstances.push(c);
    }
  });
}

function setCategory(cat) {
  activeCategory = cat;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── INIT ──
render();
</script>
</body>
</html>
